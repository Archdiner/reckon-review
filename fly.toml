# Fly config for Vouch (reckon-pr). Secrets are set via `fly secrets set`, NOT here.
app = "reckon-pr"
primary_region = "iad"   # change to your nearest region

[build]

[http_service]
  internal_port = 3000
  force_https = true
  # Keep one machine warm: webhook processing (decompose ~7s) plus cold-start would risk
  # GitHub's ~10s delivery timeout and duplicate retries. min 1 avoids cold starts.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  PORT = "3000"
