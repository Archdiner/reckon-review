# fly.toml app configuration file generated for reckon-pr on 2026-07-18T21:34:09+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'reckon-pr'
primary_region = 'iad'

[build]
[env]
  NODE_ENV = 'production'
  PORT = '3000'
  HOST = '0.0.0.0'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
